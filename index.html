    /* ===== Matrix TV — fullscreen home ===== */
    .tv-hero{position:relative;min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:14px;padding:20px;}
    .tv-hero::before{content:"";position:absolute;inset:0;
      background:radial-gradient(50% 55% at 50% 42%, rgba(74,255,150,.16), transparent 62%),
                 radial-gradient(46% 52% at 70% 40%, rgba(124,92,255,.16), transparent 60%);
      z-index:0;pointer-events:none;}
    .tv{position:relative;z-index:1;width:min(1120px,92vw,138vh);aspect-ratio:16/9;border-radius:24px;
      padding:16px;background:linear-gradient(160deg,#191b22,#0a0b10 60%);
      box-shadow:0 40px 90px rgba(0,0,0,.6),0 2px 0 rgba(255,255,255,.06) inset,0 -10px 30px rgba(0,0,0,.5) inset;
      border:1px solid rgba(255,255,255,.06);}
    .tv::after{content:"";position:absolute;left:50%;bottom:-3px;transform:translateX(-50%);
      width:8px;height:8px;border-radius:50%;background:#48f58a;box-shadow:0 0 12px #48f58a;opacity:.9;}
    .tv__screen{position:absolute;inset:16px;border-radius:12px;overflow:hidden;background:#02030a;
      box-shadow:0 0 0 2px rgba(0,0,0,.6),0 0 60px rgba(72,245,138,.12) inset;}
    .tv__canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
    .tv__scan{position:absolute;inset:0;pointer-events:none;z-index:2;
      background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.16) 2px 3px),
                 radial-gradient(120% 120% at 50% 50%, transparent 62%, rgba(0,0,0,.55) 100%);
      mix-blend-mode:multiply;}
    .tv__glare{position:absolute;inset:0;pointer-events:none;z-index:3;
      background:linear-gradient(115deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,0) 26%);}

    /* slide-down in-screen menu */
    .tv__menu{position:absolute;top:0;left:0;right:0;z-index:4;display:flex;gap:6px;flex-wrap:wrap;
      justify-content:center;padding:10px 12px;
      background:linear-gradient(180deg, rgba(6,20,12,.86), rgba(6,20,12,.35));
      border-bottom:1px solid rgba(72,245,138,.35);backdrop-filter:blur(4px);
      transform:translateY(-110%);transition:transform .7s cubic-bezier(.2,.9,.25,1);}
    .tv__menu.is-on{transform:translateY(0);}
    .tv__menu a{font:600 13px/1 ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
      color:#c9ffe0;text-decoration:none;letter-spacing:.4px;padding:7px 10px;border-radius:8px;
      border:1px solid transparent;text-shadow:0 0 8px rgba(72,245,138,.45);transition:.15s;white-space:nowrap;}
    .tv__menu a:hover{background:rgba(72,245,138,.14);border-color:rgba(72,245,138,.5);color:#eafff2;}
    .tv__menu a.tv__contact{background:rgba(72,245,138,.9);color:#04140b;text-shadow:none;}
    .tv__menu a.tv__contact:hover{background:#8dffbf;}

    /* caption fades in over the reveal */
    .tv__caption{position:absolute;left:0;right:0;bottom:0;z-index:4;padding:16px 20px 18px;
      display:flex;flex-direction:column;gap:10px;
      background:linear-gradient(0deg, rgba(2,8,5,.82), transparent);
      opacity:0;transform:translateY(14px);transition:opacity .8s ease,transform .8s ease;}
    .tv__caption.is-on{opacity:1;transform:translateY(0);}
    .tv__name{margin:0;font:800 clamp(24px,4.4vw,40px)/1 ui-monospace,Menlo,Consolas,monospace;
      color:#eafff2;letter-spacing:1px;text-shadow:0 0 14px rgba(72,245,138,.55);}
    .tv__role{margin:0;font:600 clamp(12px,1.8vw,15px)/1.2 ui-monospace,Menlo,Consolas,monospace;
      color:#7ff0ad;letter-spacing:1px;}
    .tv__cta{display:flex;gap:10px;flex-wrap:wrap;margin-top:2px;}
    .tv__cta .btn{font-size:14px;}
    .tv__cta .btn--ghost{color:#daffe9;border-color:rgba(150,255,190,.55);background:rgba(6,20,12,.4);}
    .tv__cta .btn--ghost:hover{background:rgba(72,245,138,.16);border-color:rgba(150,255,190,.85);color:#eafff2;}

    .tv__hint{z-index:1;margin:0;color:#8a93a8;font-size:13px;letter-spacing:.3px;text-align:center;}
    .tv__skip{background:none;border:1px solid rgba(255,255,255,.2);color:#aeb6c9;
      border-radius:999px;padding:5px 12px;font-size:12px;cursor:pointer;margin-left:8px;}
    .tv__skip:hover{border-color:rgba(255,255,255,.4);color:#fff;}

    @media (max-width:560px){
      .tv-hero{padding:16px 12px;justify-content:flex-start;padding-top:5vh;}
      .tv{padding:9px;border-radius:16px;width:min(96vw,64vh);aspect-ratio:4/5;}
      .tv__screen{inset:9px;border-radius:10px;}
      .tv__menu{gap:4px 5px;padding:7px 8px;flex-wrap:wrap;justify-content:center;overflow:visible;}
      .tv__menu a{font-size:11px;padding:5px 9px;}
      .tv__caption{padding:12px 12px 14px;gap:8px;}
      .tv__name{font-size:26px;}
      .tv__role{font-size:11px;}
      .tv__cta .btn{font-size:13px;padding:9px 14px;}
    }
    @media (prefers-reduced-motion:reduce){
      .tv__menu,.tv__caption{transition:none;}
    }
  </style>

  <script>
  /* ===== Matrix TV: rain -> portrait reveal -> menu/caption ===== */
  (function(){
    var section = document.querySelector('.tv-hero');
    if(!section) return;
    var canvas = section.querySelector('[data-tvcanvas]');
    var menu   = section.querySelector('[data-tvmenu]');
    var cap    = section.querySelector('[data-tvcap]');
    var skip   = section.querySelector('[data-tvskip]');
    var ctx = canvas.getContext('2d', {alpha:false});
    var reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;

    var glyphs = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリギジヂビピウゥクスツヌフムユュルレロヲゴゾドボポ0123456789<>=*+:.#$%&Z@ｦｱｲｳｴｵ'.split('');
    var CW = 0, CH = 0, dpr = 1, fs = 16, cols = 0;
    var drops = [];
    var img = new Image(), imgReady = false, portrait = null;
    img.onload = function(){ imgReady = true; buildPortrait(); };
    img.src = 'assets/avatar.png';

    function size(){
      var r = canvas.getBoundingClientRect();
      CW = Math.max(1, r.width); CH = Math.max(1, r.height);
      dpr = Math.min(2, window.devicePixelRatio || 1);
      canvas.width = Math.round(CW*dpr); canvas.height = Math.round(CH*dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      fs = CW < 560 ? 12 : (CW < 800 ? 14 : 16);
      cols = Math.ceil(CW/fs);
      drops = new Array(cols);
      for(var i=0;i<cols;i++) drops[i] = Math.random()*(CH/fs);
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = '#02030a'; ctx.fillRect(0,0,CW,CH);
      if(imgReady) buildPortrait();
    }

    // pre-render the photo as a green duotone with darkened background + vignette
    function buildPortrait(){
      if(!CW || !CH) return;
      var W = Math.round(CW), H = Math.round(CH);
      var po = document.createElement('canvas'); po.width = W; po.height = H;
      var p = po.getContext('2d');
      var ir = img.width/img.height, gr = W/H, sx=0, sy=0, sw=img.width, sh=img.height;
      if(ir > gr){ sw = img.height*gr; sx = (img.width - sw)/2; }
      else { sh = img.width/gr; sy = (img.height - sh)/2; }
      p.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);
      var im = p.getImageData(0,0,W,H), d = im.data;
      var cx = W/2, cy = H*0.5, maxr = Math.hypot(cx,cy);
      for(var i=0,px=0;i<d.length;i+=4,px++){
        var x = px%W, y = (px/W)|0;
        var L = (0.299*d[i]+0.587*d[i+1]+0.114*d[i+2])/255;
        var bgd = L>0.78 ? (1-(L-0.78)/0.22*0.92) : 1;   // fade out bright background
        var vr = Math.hypot(x-cx,y-cy)/maxr;
        var vig = 1 - Math.pow(Math.max(0,vr-0.32)/0.68,1.5)*0.95;
        var f = bgd*vig;
        d[i]   = Math.min(255, L*70*f);
        d[i+1] = Math.min(255, (55 + L*205)*f);
        d[i+2] = Math.min(255, L*115*f);
      }
      p.putImageData(im,0,0);
      portrait = po;
    }

    var start = 0, last = 0;
    var T_REV0 = 3600, T_REV1 = 5200, T_MENU = 4200, T_CAP = 5000;
    function revealAt(t){ return Math.max(0, Math.min(1, (t - T_REV0)/(T_REV1 - T_REV0))); }
    function easeOut(x){ return 1 - Math.pow(1-x, 3); }

    function frame(now){
      if(!start){ start = now; last = now; }
      var t = now - start;
      if(now - last < 32){ raf = requestAnimationFrame(frame); return; } // ~30fps
      last = now;

      ctx.fillStyle = 'rgba(2,3,10,0.16)';
      ctx.fillRect(0,0,CW,CH);
      ctx.font = fs+'px ui-monospace, Menlo, Consolas, monospace';

      var reveal = easeOut(revealAt(t));
      var headA = 1 - 0.8*reveal;

      // matrix rain (fades as the photo comes in)
      if(headA > 0.02){
        for(var i=0;i<cols;i++){
          var y = drops[i]*fs;
          ctx.fillStyle = 'rgba(200,255,220,'+(0.85*headA)+')';
          ctx.fillText(glyphs[(Math.random()*glyphs.length)|0], i*fs, y);
          ctx.fillStyle = 'rgba(40,220,120,'+(0.45*headA)+')';
          ctx.fillText(glyphs[(Math.random()*glyphs.length)|0], i*fs, y-fs);
          if(y > CH && Math.random() > 0.975) drops[i] = 0; else drops[i]++;
        }
      }

      // the photo materialises out of the code
      if(reveal > 0 && portrait){
        ctx.globalAlpha = reveal;
        ctx.drawImage(portrait, 0, 0, CW, CH);
        ctx.globalAlpha = 1;
      }

      // code keeps dripping over the photo
      if(reveal > 0.15){
        for(var k=0;k<cols;k++){
          if(Math.random() > 0.35) continue;
          var yy = drops[k]*fs;
          ctx.fillStyle = 'rgba(150,255,190,'+(0.10 + Math.random()*0.18)+')';
          ctx.fillText(glyphs[(Math.random()*glyphs.length)|0], k*fs, yy);
          if(yy > CH && Math.random() > 0.97) drops[k] = 0; else drops[k]++;
        }
      }

      if(t > T_MENU) menu.classList.add('is-on');
      if(t > T_CAP)  cap.classList.add('is-on');

      raf = requestAnimationFrame(frame);
    }

    function finishNow(){
      start = performance.now() - (T_REV1 + 300);
      menu.classList.add('is-on'); cap.classList.add('is-on');
    }

    var raf = 0, running = false;
    function play(){ if(running) return; running = true; last = 0; raf = requestAnimationFrame(frame); }
    function stop(){ running = false; if(raf) cancelAnimationFrame(raf); raf = 0; }

    size();
    if(reduce){
      var draw = function(){ ctx.fillStyle='#02030a'; ctx.fillRect(0,0,CW,CH); if(portrait) ctx.drawImage(portrait,0,0,CW,CH); menu.classList.add('is-on'); cap.classList.add('is-on'); };
      if(imgReady) draw(); else img.addEventListener('load', function(){ buildPortrait(); draw(); });
    } else {
      play();
    }

    if(skip) skip.addEventListener('click', function(){ if(!reduce) finishNow(); });

    var rt;
    window.addEventListener('resize', function(){ clearTimeout(rt); rt = setTimeout(function(){ var s = start; size(); start = s; if(reduce && portrait){ ctx.fillStyle='#02030a'; ctx.fillRect(0,0,CW,CH); ctx.drawImage(portrait,0,0,CW,CH); } }, 180); });

    // pause when off-screen / tab hidden (saves battery; real visible tab runs normally)
    if('IntersectionObserver' in window && !reduce){
      new IntersectionObserver(function(e){
        if(e[0].isIntersecting && !document.hidden) play(); else stop();
      }, {threshold:0.03}).observe(section);
    }
    document.addEventListener('visibilitychange', function(){ if(reduce) return; if(document.hidden) stop(); else play(); });
  })();
  </script>
